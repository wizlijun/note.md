<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html,body{height:100%;}
  body{margin:0;padding:16px;background:#dfe2e6;display:flex;gap:18px;align-items:flex-start;
    font:12px/1.3 -apple-system,"SF Pro Text","PingFang SC",system-ui,sans-serif;}

  /* each window is a FIXED viewport that must fill with NO scrollbar */
  .win{width:940px;height:700px;border-radius:12px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.18);
    display:flex;flex-direction:column;
    --bg:#fff;--fg:#22252a;--muted:#9aa0a8;--line:#e6e8ec;--wm:#f0f1f4;
    --chip-bg:#f2f3f5;--chip-active:#2f6feb;
    --accent:#2f6feb;--accent-fg:#fff;
    --link:#2f6feb;--note:#e8a13a;
    --past:#f1f2f4;--past-day:#aab0b8;
    --future-line:#eaecef;--future-day:#c6ccd4;
    --today-ring:#ff9500;--weekend:#e0605a;--yearart:#d21f2b;
    background:var(--bg);color:var(--fg);}
  .win.dark{--bg:#191b1f;--fg:#e7e9ec;--muted:#7b8189;--line:#2a2d33;--wm:#20232800;
    --chip-bg:#2a2d33;--chip-active:#3b82f6;
    --accent:#4b8bff;--accent-fg:#fff;--link:#6aa5ff;--note:#f0b657;
    --past:#212429;--past-day:#767c85;
    --future-line:#282b31;--future-day:#565c65;
    --today-ring:#ffa726;--weekend:#e0736d;--yearart:#ff5a63;}

  .tbar{height:34px;flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 14px;border-bottom:1px solid var(--line)}
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .tbar .title{margin-left:8px;font-weight:600;font-size:13px}

  .head{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding:10px 20px 6px}
  .yearart{font-family:'Snell Roundhand','Zapfino',cursive;font-weight:700;font-style:italic;
    font-size:46px;line-height:1;color:var(--yearart)}
  .subtitle{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:3px}
  .spacer{flex:1}
  .toolbar{display:flex;align-items:center;gap:7px}
  .arrow{width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:var(--chip-bg);color:var(--fg);display:grid;place-items:center;font-size:14px;cursor:pointer}
  .years{display:flex;gap:5px}
  .ychip{padding:4px 10px;border-radius:20px;background:var(--chip-bg);color:var(--fg);font-weight:600;font-size:12px;cursor:pointer}
  .ychip.active{background:var(--chip-active);color:#fff}
  .tbtn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:var(--chip-bg);color:var(--fg);font-weight:600;font-size:12px;cursor:pointer}
  .tbtn.accent{border-color:var(--accent);color:var(--accent);background:transparent}

  /* calendar fills remaining height; 4 cols x 3 rows; NO scroll */
  .cal{flex:1 1 auto;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);
    gap:10px 16px;padding:6px 20px 8px;min-height:0}
  .month{position:relative;display:flex;flex-direction:column;min-height:0}
  .wm{position:absolute;right:0;top:8px;font-size:44px;font-weight:800;color:var(--wm);z-index:0;pointer-events:none;letter-spacing:-2px}
  .mtitle{font-weight:700;font-size:12px;margin:0 0 2px 2px;position:relative;z-index:1}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);position:relative;z-index:1}
  .dow span{text-align:center;font-size:9px;color:var(--muted);font-weight:600}
  .dow span.we{color:var(--weekend)}
  .weeks{position:relative;z-index:1;display:flex;flex-direction:column;gap:2px;flex:1 1 auto;min-height:0}
  .wk{display:grid;grid-template-columns:repeat(7,1fr);border-radius:6px;border:1px solid transparent;flex:1 1 0;min-height:0}
  .wk.past{background:var(--past)}
  .wk.future{border-color:var(--future-line)}
  .wk.review{background:var(--accent)}
  .wk.review.clickable{cursor:pointer}
  .wk.today{outline:2px solid var(--today-ring);outline-offset:1px}
  .day{position:relative;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;min-width:0}
  .wk.past .day{color:var(--past-day)}
  .wk.future .day{color:var(--future-day)}
  .day.we{color:var(--weekend)}
  .day.empty{color:transparent}
  .wk.review .day{color:var(--accent-fg)}
  /* diary day: number becomes a link */
  .day.diary .num{color:var(--link);text-decoration:underline;text-underline-offset:2px;cursor:pointer;font-weight:800}
  .wk.review .day.diary .num{color:#fff;text-decoration-color:#cfe0ff}
  /* note sparkle-star icon top-right */
  .note{position:absolute;top:0;right:0;line-height:0;cursor:pointer}
  .star{width:11px;height:11px;display:block;fill:var(--note)}
  .wk.review .star{fill:#ffe08a}

  .legend{flex:0 0 auto;display:flex;gap:14px;margin:0 20px;padding:8px 0 10px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);flex-wrap:wrap;align-items:center}
  .legend .it{display:flex;align-items:center;gap:5px}
  .sw{width:20px;height:13px;border-radius:4px}
  .sw.review{background:var(--accent)}
  .sw.today{background:var(--past);outline:2px solid var(--today-ring);outline-offset:-2px}
  .sw.past{background:var(--past)}
  .lk{color:var(--link);text-decoration:underline;font-weight:800}
  .ni{color:var(--note);font-size:12px}
</style>
</head>
<body>
  <div class="win" id="win-light"></div>
  <div class="win dark" id="win-dark"></div>
<script>
  const YEAR=2026, TODAY=new Date(2026,6,23);
  const REVIEWS=new Set([27,30]);               // weeks with a weekly-review (illustrative)
  const DOW=["一","二","三","四","五","六","日"];
  const STAR='<svg class="star" viewBox="0 0 24 24"><path d="M12 0.5 C12.8 7.2 16.8 11.2 23.5 12 C16.8 12.8 12.8 16.8 12 23.5 C11.2 16.8 7.2 12.8 0.5 12 C7.2 11.2 11.2 7.2 12 0.5 Z"/></svg>';
  // illustrative diary + dailynote day sets (key 'M-D')
  const diary=new Set(), note=new Set();
  // diaries: dense Jun16–Jul23
  for(const [m,a,b] of [[6,16,30],[7,1,23]]) for(let d=a; d<=b; d++){ if(d%7!==0) diary.add(`${m}-${d}`) }
  // notes: scattered across the year
  [[1,7],[1,20],[2,3],[3,11],[3,28],[4,15],[5,6],[6,18],[6,22],[7,6],[7,13],[7,20],[9,2],[11,11]].forEach(([m,d])=>note.add(`${m}-${d}`));

  function isoWeek(d){const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-day+3);const f=new Date(Date.UTC(t.getUTCFullYear(),0,4));const fd=(f.getUTCDay()+6)%7;f.setUTCDate(f.getUTCDate()-fd+3);return 1+Math.round((t-f)/(7*864e5));}
  function mondayOf(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
  const todayMon=mondayOf(TODAY).getTime();

  function monthEl(m){
    const last=new Date(YEAR,m+1,0).getDate(); const map={},rows=[];
    for(let dn=1;dn<=last;dn++){const d=new Date(YEAR,m,dn);const mon=mondayOf(d).getTime();
      if(!(mon in map)){map[mon]={mon,wk:isoWeek(d),cells:[null,null,null,null,null,null,null]};rows.push(map[mon]);}
      map[mon].cells[(d.getDay()+6)%7]=dn;}
    let html=`<div class="wm">${m+1}</div><div class="mtitle">${m+1}月</div>`
      +`<div class="dow">${DOW.map((x,i)=>`<span class="${i>=5?'we':''}">${x}</span>`).join('')}</div><div class="weeks">`;
    for(const r of rows){
      const reviewed=REVIEWS.has(r.wk);
      let cls='wk'+(reviewed?' review clickable':(r.mon>todayMon?' future':' past'))+(r.mon===todayMon?' today':'');
      const cells=r.cells.map((v,i)=>{
        if(v==null) return `<div class="day empty">·</div>`;
        const key=`${m+1}-${v}`; const hasD=diary.has(key), hasN=note.has(key);
        const we=i>=5?' we':''; const dcls='day'+we+(hasD?' diary':'');
        return `<div class="${dcls}"><span class="num">${v}</span>${hasN?'<span class="note">'+STAR+'</span>':''}</div>`;
      }).join('');
      html+=`<div class="${cls}">${cells}</div>`;
    }
    return `<div class="month">${html}</div></div>`;
  }
  function build(el){
    let months=''; for(let m=0;m<12;m++) months+=monthEl(m);
    el.innerHTML=`
      <div class="tbar"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div><div class="title">周检视 · Weekly Review</div></div>
      <div class="head">
        <div class="yearart">2026</div><div class="subtitle">周 检 视</div><div class="spacer"></div>
        <div class="toolbar">
          <div class="arrow">‹</div>
          <div class="years"><div class="ychip">2024</div><div class="ychip">2025</div><div class="ychip active">2026</div></div>
          <div class="arrow">›</div>
          <div class="tbtn accent">◎ 本周</div><div class="tbtn">↻ 重构</div>
        </div>
      </div>
      <div class="cal">${months}</div>
      <div class="legend">
        <div class="it"><span class="sw review"></span>本周周记(点空白格)</div>
        <div class="it"><span class="sw today"></span>本周</div>
        <div class="it"><span class="lk">12</span> 有日记(点数字打开)</div>
        <div class="it"><span class="ni">✦</span> 有笔记(点图标看大纲)</div>
        <div class="it"><span class="sw past"></span>已过去</div>
      </div>`;
  }
  build(document.getElementById('win-light'));
  build(document.getElementById('win-dark'));
</script>
</body>
</html>
