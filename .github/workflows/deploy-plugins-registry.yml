name: Deploy plugins registry worker

on:
  push:
    branches: [main]
    paths:
      - "plugins-registry/**"
      - ".github/workflows/deploy-plugins-registry.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # plugins-registry has its own pnpm-lock.yaml, so wrangler-action detects
      # pnpm as the package manager. Make pnpm (and Node) available first, or the
      # action fails with "Unable to locate executable file: pnpm".
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: plugins-registry/pnpm-lock.yaml
      # Install the devDependency wrangler (+ the rest) so wrangler-action finds
      # it via `pnpm exec wrangler` and doesn't try to `pnpm add` it into the
      # workspace root (which pnpm refuses without -w).
      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: plugins-registry
      - name: Deploy notemd-plugins to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: plugins-registry
