name = "mdeditor-share"
account_id = "9aec351745dbb8adf336b98a0f473761"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

kv_namespaces = [
  { binding = "SHARES", id = "5ca75b01c7534ae5b73eb41d212b18c9" }
]

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "mdeditor-share-media"
preview_bucket_name = "mdeditor-share-media-preview"

# Custom domain: uncomment after pointing DNS at Cloudflare.
# routes = [
#   { pattern = "share.example.com/*", custom_domain = true }
# ]

[[durable_objects.bindings]]
name = "AUDIENCE"
class_name = "SlugAnalytics"

[[durable_objects.bindings]]
name = "AUDIENCE_DAY"
class_name = "DayRollup"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SlugAnalytics"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DayRollup"]
