[package]
name = "mdeditor"
version = "0.2.5"
edition = "2021"

[lib]
name = "mdeditor_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# devtools is automatic in debug builds; do not include for release
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-store = "2"
tauri-plugin-single-instance = "2"
tauri-plugin-deep-link = "2"
tokio = { version = "1", features = ["time"] }
serde = { version = "1", features = ["derive"] }

[target.'cfg(target_os = "macos")'.dependencies]
core-foundation = "0.10"
objc2-pdf-kit = { version = "0.3", features = ["PDFDocument", "PDFPage"] }
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
  "NSString",
  "NSURL",
  "NSData",
  "NSError",
  "NSValue",
  "NSGeometry",
] }
objc2-app-kit = { version = "0.3", features = [
  "NSApplication",
  "NSWindow",
  "NSView",
] }
objc2-web-kit = { version = "0.3", features = [
  "WKWebView",
  "WKWebViewConfiguration",
  "WKNavigationDelegate",
  "WKNavigation",
  "WKPDFConfiguration",
  "block2",
] }
block2 = "0.6"

[profile.release]
opt-level = "z"       # optimize for size
lto = true            # link-time optimization across crates
codegen-units = 1     # one unit → better whole-program optimization
panic = "abort"       # no unwinding tables
strip = true          # strip debug symbols
incremental = false
